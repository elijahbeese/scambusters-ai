<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ScamBusters Agent v2{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:      #07090c;
  --bg2:     #0d1117;
  --bg3:     #161b22;
  --border:  #1c2128;
  --border2: #262d36;
  --text:    #c9d1d9;
  --muted:   #484f58;
  --accent:  #00d4aa;
  --accent2: #00b894;
  --blue:    #0099ff;
  --warn:    #ff8c00;
  --danger:  #ff3b5c;
  --purple:  #9b6dff;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* ── Nav ── */
nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-decoration: none;
  margin-right: 24px;
}

.nav-link {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  padding: 0 12px;
  height: 52px;
  display: flex;
  align-items: center;
  border-bottom: 2px solid transparent;
  transition: color 0.1s, border-color 0.1s;
}

.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

.nav-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Layout ── */
.container { max-width: 1300px; margin: 0 auto; padding: 28px 24px; }

.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.page-header h1 {
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}

.page-subtitle {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── Grid ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 16px; }

@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

/* ── Cards ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.card-title {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

/* ── KV rows ── */
.kv-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.kv-row:last-child { border-bottom: none; }

.kv-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  min-width: 120px;
  flex-shrink: 0;
}

.kv-value {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  text-align: right;
  word-break: break-all;
}

/* ── Table ── */
table { width: 100%; border-collapse: collapse; }
th {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 12px;
  vertical-align: top;
}
tr:hover td { background: var(--bg3); }
tr:last-child td { border-bottom: none; }
.mono { font-family: var(--mono) !important; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: opacity 0.1s;
}

.btn:hover { opacity: 0.85; }

.btn-primary { background: var(--accent); color: #000; }
.btn-danger  { background: var(--danger); color: #fff; }
.btn-warn    { background: var(--warn);   color: #000; }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}

.btn-ghost:hover { color: var(--text); border-color: var(--border2); }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.badge-complete   { background: rgba(0,212,170,0.15); color: var(--accent); border: 1px solid rgba(0,212,170,0.3); }
.badge-approved   { background: rgba(0,153,255,0.15); color: var(--blue);   border: 1px solid rgba(0,153,255,0.3); }
.badge-pending    { background: var(--bg3);            color: var(--muted);  border: 1px solid var(--border); }
.badge-high       { background: rgba(255,59,92,0.15);  color: var(--danger); border: 1px solid rgba(255,59,92,0.3); }
.badge-warn       { background: rgba(255,140,0,0.15);  color: var(--warn);   border: 1px solid rgba(255,140,0,0.3); }
.badge-investigating { background: rgba(255,140,0,0.1); color: var(--warn); border: 1px solid rgba(255,140,0,0.2); }

/* ── Risk badges ── */
.risk {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.risk-CRITICAL { background: #2a0810; color: var(--danger); border: 1px solid #3a0810; }
.risk-HIGH     { background: #2a1808; color: var(--warn);   border: 1px solid #3a2008; }
.risk-MEDIUM   { background: #1a2010; color: #88cc44;       border: 1px solid #2a3010; }
.risk-LOW      { background: #081820; color: var(--blue);   border: 1px solid #0a2030; }
.risk-MINIMAL  { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.risk-unknown  { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

/* ── Alerts ── */
.alert {
  padding: 12px 16px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  margin-bottom: 16px;
}
.alert-warn  { background: rgba(255,140,0,0.1);  border: 1px solid rgba(255,140,0,0.3);  color: var(--warn); }
.alert-error { background: rgba(255,59,92,0.1);  border: 1px solid rgba(255,59,92,0.3);  color: var(--danger); }
.alert-ok    { background: rgba(0,212,170,0.1);  border: 1px solid rgba(0,212,170,0.3);  color: var(--accent); }

/* ── Terminal/log output ── */
.log-box {
  background: #000;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
  max-height: 400px;
  overflow-y: auto;
}

.log-stage   { color: var(--blue); }
.log-message { color: var(--text); }
.log-done    { color: var(--accent); font-weight: 600; }
.log-error   { color: var(--danger); }
.log-ts      { color: var(--muted); margin-right: 8px; }
</style>
</head>
<body>

<nav>
  <a href="/dashboard" class="nav-brand">SCAMBUSTERS AGENT</a>
  <a href="/dashboard"  class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Bounties</a>
  <a href="/intake"     class="nav-link {% if request.path == '/intake' %}active{% endif %}">+ New Bounty</a>
  <a href="/"           class="nav-link {% if request.path == '/' %}active{% endif %}">Public Dashboard</a>
  <div class="nav-right">
    <div class="live-dot"></div>
    <span style="font-family:var(--mono);font-size:11px;color:var(--muted);">v2.0 · I4G</span>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
